[build]
  command = "npm run build"
  publish = "dist/masq-board/browser"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors 'self' teams.microsoft.com *.teams.microsoft.com *.microsoft.com *.skype.com *.office.com *.office365.com"
